log:
  level: warn
  file: "/tmp/mosdns.log"

#跟web ui绑定，不要修改此端口
api:
  http: "0.0.0.0:9099"

#子配置，不要调整顺序
include:
  - "sub_config/adguard.yaml"               #Adguard插件
  - "sub_config/domain_output.yaml"         #域名规则生成输出插件定义
  - "sub_config/rule_set.yaml"              #数据插件定义
  - "sub_config/cache.yaml"                 #缓存插件定义
  - "sub_config/forward_local.yaml"         #带过期缓存的内部使用国内dns服务器
  - "sub_config/forward_nocn.yaml"          #带过期缓存的内部使用国外dns服务器
  - "sub_config/forward_nocn_ecs.yaml"      #带过期缓存的内部使用国外dns服务器（带ecs）节点使用
  - "sub_config/forward_1.yaml"             #使用前面定义的内部dns服务器定义序列 1代表调用层级 大的调用小的
  - "sub_config/special_groups.yaml"        #特殊上游组 50-59 槽位定义
  - "sub_config/switch.yaml"                #切换开关定义
  - "sub_config/process_ot.yaml"            #主分流序列-其它类型dns请求
  - "sub_config/process_v4.yaml"            #主分流序列-IPV4类型dns请求
  - "sub_config/process_v6.yaml"            #主分流序列-IPV6类型dns请求
  - "sub_config/for_singbox.yaml"           #专供sing-box使用
  - "sub_config/webinfo.yaml"               #前端信息与配置存储
  - "sub_config/requery.yaml"               #分流与缓存刷新功能

plugins:
  - tag: sequence_6666
    type: sequence
    args:
      - matches: switch11 'A'               #rewrite开关
        exec: $rewrite                      #匹配成功重定向后直接结束不执行后续流程
      - matches:                            #阻止SOA PTR HTTPS类型的dns查询
        - "qtype 6 12 65"
        - switch5 'A'
        exec: reject 0
      - matches:                            #阻止AAAA类型的dns查询
        - "qtype 28"
        - switch6 'A'
        exec: reject 0
      - matches: "!fast_mark 48"            #可以视为在快速路径中没有比对过
        exec: $unified_matcher1             #匹配屏蔽域名表并设置相应的fast_mark
      - exec: $special_upstream_matcher     #匹配专属分流组并设置 50-59 mark
      - matches:                            #屏蔽没有v4地址的域名
        - fast_mark 2
        - qtype 1
        - switch1 'A'
        exec: reject 0
      - matches:                            #屏蔽没有v6地址的域名
        - fast_mark 3
        - qtype 28
        - switch1 'A'
        exec: reject 0
      - matches:                            #屏蔽黑名单域名
        - fast_mark 1
        - switch1 'A'
        exec: reject 3
      - matches:                            #屏蔽广告
        - fast_mark 5
        - switch7 'A'
        exec: reject 3
      - matches: fast_mark 6                #向上游请求ddns域名，无过期缓存
        exec:
          - $domestic
          - exit
      - matches:                            #当mosdns占用53直面客户端，只有client_ip.txt中指定的IP才科学       
        - "!fast_mark 48"                   #在快速路径中没有比对过
        - switch2 'A'
        - switch12 'B'
        - "!client_ip $client_ip"
        exec: fast_mark 30
      - matches:                            #当mosdns占用53直面客户端，client_ip.txt中指定的IP不科学
        - "!fast_mark 48"                   #在快速路径中没有比对过
        - switch2 'B'
        - switch12 'A'
        - "client_ip $client_ip"
        exec: fast_mark 30
      - matches: fast_mark 30
        exec:
          - $sequence_local
          - tag_setter 指定客户端直连
          - exit
      - matches:                            #web ui中选择泄露版（默认），用cache_all，否则用cache_all_noleak
        - switch3 'A'                       #泄露模式
        - switch13 'A'                      #缓存开关打开
        exec: $cache_all
      - matches:
        - switch3 'B'                       #非泄露模式
        - switch13 'A'                      #缓存开关打开
        exec: $cache_all_noleak
      - exec: $top_domains
      - matches: qtype 1                    #处理A请求
        exec: $sequence_ipv4
      - matches: qtype 28                   #处理AAAA请求
        exec: $sequence_ipv6
      - matches: "!qtype 1 28"              #处理非A、AAAA请求
        exec: $sequence_other

#对外服务器
  - tag: udp_all
    type: udp_server
    args:
      entry: sequence_6666
      listen: ":53"
      enable_audit: true

  - tag: tcp_all
    type: tcp_server
    args:
      entry: sequence_6666
      listen: ":53"
      enable_audit: true
      idle_timeout: 720

  - tag: sequence_requery
    type: sequence
    args:
      - matches:                            #阻止SOA PTR HTTPS类型的dns查询
        - "qtype 6 12 65"
        - switch5 'A'
        exec: reject 0
      - matches:                            #阻止AAAA类型的dns查询
        - "qtype 28"
        - switch6 'A'
        exec: reject 0
      - matches: "!fast_mark 48"            #可以视为在快速路径中没有比对过
        exec: $unified_matcher1             #匹配屏蔽域名表并设置相应的fast_mark
      - matches:                            #屏蔽没有v4地址的域名
        - fast_mark 2
        - qtype 1
        - switch1 'A'
        exec: reject 0
      - matches:                            #屏蔽没有v6地址的域名
        - fast_mark 3
        - qtype 28
        - switch1 'A'
        exec: reject 0
      - matches:                            #屏蔽黑名单域名
        - fast_mark 1
        - switch1 'A'
        exec: reject 3
      - matches:                            #屏蔽广告
        - fast_mark 5
        - switch7 'A'
        exec: reject 3
      - matches: fast_mark 6                #向上游请求ddns域名，无过期缓存
        exec:
          - $domestic
          - exit
      - matches:                            #当mosdns占用53直面客户端，只有client_ip.txt中指定的IP才科学       
        - "!fast_mark 48"                   #在快速路径中没有比对过
        - switch2 'A'
        - switch12 'B'
        - "!client_ip $client_ip"
        exec: fast_mark 30
      - matches:                            #当mosdns占用53直面客户端，client_ip.txt中指定的IP不科学
        - "!fast_mark 48"                   #在快速路径中没有比对过
        - switch2 'B'
        - switch12 'A'
        - "client_ip $client_ip"
        exec: fast_mark 30
      - matches: fast_mark 30
        exec:
          - $sequence_local
          - tag_setter 指定客户端直连
          - exit
      - matches:                            #web ui中选择泄露版（默认），用cache_all，否则用cache_all_noleak
        - switch3 'A'                       #泄露模式
        - switch13 'A'                      #缓存开关打开
        exec: $cache_all
      - matches:
        - switch3 'B'                       #非泄露模式
        - switch13 'A'                      #缓存开关打开
        exec: $cache_all_noleak
      - matches: switch11 'A'               #rewrite开关
        exec: $rewrite                      #匹配成功重定向后直接结束不执行后续流程
      - matches: qtype 1                    #处理A请求
        exec: $sequence_ipv4
      - matches: qtype 28                   #处理AAAA请求
        exec: $sequence_ipv6
      - matches: "!qtype 1 28"              #处理非A、AAAA请求
        exec: $sequence_other
                                            #刷新分流与缓存的服务器，不记录日志，不计算tom_domains请求数
  - tag: udp_requery
    type: udp_server
    args:
      entry: sequence_requery
      listen: ":66"

  - tag: tcp_requery
    type: tcp_server
    args:
      entry: sequence_requery
      listen: ":66"

  - tag: sequence_for_stash
    type: sequence
    args:
      - exec: try $sequence_6666                  #捕获exit动作后继续后续流程
      - matches: "resp_ip 30.0.0.0/8 2400::1/64"  #如果主路由返回了国内fakeip
        exec:
          - $sequence_local
          - tag_setter stash国内
          - exit
      - matches: "resp_ip 28.0.0.0/8 2001:2::/64"
        exec:
          - tag_setter stash国外
          - exit
      - exec: tag_setter stash国内
                  
  - tag: udp_stash                                #给stash回家用的dns服务器
    type: udp_server
    args:
      entry: sequence_for_stash
      listen: ":77"
      enable_audit: true

  - tag: tcp_stash
    type: tcp_server
    args:
      entry: sequence_for_stash
      listen: ":77"
      enable_audit: true

  - tag: sequence_for_clashmi                      #给clashmi回家用的服务器
    type: sequence
    args:
      - exec: try $sequence_6666
      - matches: "resp_ip 28.0.0.0/8 2001:2::/64"
        exec:
          - fast_mark 26
          - tag_setter clashmi国外
          - exit
      - matches: "!resp_ip 0.0.0.0/0 2000::/3"     #给clashmi透传屏蔽的域名响应
        exec: exit
      - matches: "!fast_mark 26"
        exec:
          - $sequence_local_fake_clashmi
          - tag_setter clashmi国内
          - exit
            
  - tag: udp_clashmi                               #给clashmi回家用的dns服务器
    type: udp_server
    args:
      entry: sequence_for_clashmi
      listen: ":99"
      enable_audit: true

  - tag: tcp_clashmi
    type: tcp_server
    args:
      entry: sequence_for_clashmi
      listen: ":99"
      enable_audit: true

  - tag: sequence_for_singbox
    type: sequence
    args:
      - exec: try $sequence_6666                  #捕获exit动作后继续后续流程
      - matches: "resp_ip 30.0.0.0/8 2400::1/64"  #如果主路由返回了国内fakeip
        exec:
          - tag_setter sing-box国内
          - exit
      - matches: "resp_ip 28.0.0.0/8 2001:2::/64"
        exec:
          - tag_setter sing-box国外
          - exit
      - exec: tag_setter sing-box国内
                  
  - tag: udp_singbox                               #给sing-box回家用的dns服务器
    type: udp_server
    args:
      entry: sequence_for_singbox
      listen: ":111"
      enable_audit: true

  - tag: tcp_singbox
    type: tcp_server
    args:
      entry: sequence_for_singbox
      listen: ":111"
      enable_audit: true
