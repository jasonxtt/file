plugins:
# 特殊上游槽位 50-59：用于 WebUI 创建可绑定专属上游和专属缓存的域名分流组
  - tag: special_route_50
    type: sd_set_light
    args:
      socks5: ""
      local_config: "srs/special_50.json"

  - tag: cache_special_50
    type: cache
    args:
      size: 20000000
      lazy_cache_ttl: 259200000
      dump_file: cache/cache_special_50.dump
      dump_interval: 36000

  - tag: special_upstream_50
    type: aliapi
    args:
      concurrent: 2
      upstreams:
        - addr: "223.5.5.5"

  - tag: sequence_special_50
    type: sequence
    args:
      - matches: switch4 'A'
        exec: $cache_special_50
      - exec: flow_setter group=special_50 sequence=sequence_special_50 upstream=special_upstream_50
      - exec: $special_upstream_50
      - exec: cname_remover

