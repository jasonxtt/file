plugins:
#处理AAAA请求
  - tag: sequence_ipv6_cnfakeoff
    type: sequence
    args:
      - exec: $sequence_special_v6                  #定义: sub_config/special_groups.yaml:494
      - matches: fast_mark 9                        #!cn fakeip filter
        exec: $sequence_google_exit                 #向国外dns请求realip并结束；定义: sub_config/forward_1.yaml:255
      - matches: fast_mark 9                        #序列内含有cache插件时，子序列内exit无法结束主序列，仅能结束cache更新序列
        exec: exit
      - matches: fast_mark 7                        #灰名单
        exec: $sequence_fakeip_addlist_exit         #向sing-box请求fakeip加入清单并结束；定义: sub_config/forward_1.yaml:265
      - matches: fast_mark 8                        #白名单
        exec: $sequence_local_addlist_exit_v6       #请求国内fakeip并加入国内域名列表后结束；定义: sub_config/forward_1.yaml:62
      - matches: fast_mark 8
        exec: exit
      - matches: fast_mark 15                       #订阅代理补充
        exec: $sequence_fakeip_addlist_exit         #向sing-box请求fakeip加入清单并结束；定义: sub_config/forward_1.yaml:265
      - matches: fast_mark 13                       #订阅直连补充
        exec: $sequence_local_addlist_exit_v6       #请求国内fakeip并加入国内域名列表后结束；定义: sub_config/forward_1.yaml:62
      - matches: fast_mark 13
        exec: exit
      - matches: fast_mark 14                       #geosite-geolocation-!cn
        exec: $sequence_fakeip_addlist_exit         #向sing-box请求fakeip加入清单并结束；定义: sub_config/forward_1.yaml:265
      - matches: fast_mark 16                       #订阅直连
        exec: $sequence_local_addlist_exit_v6       #请求国内fakeip并加入国内域名列表后结束；定义: sub_config/forward_1.yaml:62
      - matches: fast_mark 16
        exec: exit
      - matches: fast_mark 12                       #记忆代理
        exec: $sequence_fakeip_exit                 #请求国外fakeip并结束；定义: sub_config/forward_1.yaml:274
      - matches: fast_mark 11                       #记忆直连
        exec: $sequence_local_exit                  #请求国内fakeip并结束；定义: sub_config/forward_1.yaml:20
      - matches: fast_mark 11
        exec: exit
#列表外域名处理，后面默认都是fast_mark 17的逻辑
##先向上游请求真实的dns响应
      - matches: switch3 'A'                        #兼容模式；定义: sub_config/switch.yaml:27
        exec: $sequence_local                       #表外域名先发到国内查第1次；定义: sub_config/forward_1.yaml:112
      - matches: switch3 'B'                        #安全模式；定义: sub_config/switch.yaml:27
        exec: $sequence_google_node                 #表外域名先带ecs发到8888查第1次；定义: sub_config/forward_nocn_ecs.yaml:12
      - matches:
        - switch3 'B'                               #安全模式；定义: sub_config/switch.yaml:27
        - "!resp_ip 2000::/3"                       #还是没有IP
        exec: $sequence_local                       #安全模式国内dns查第2次；定义: sub_config/forward_1.yaml:112
##再根据响应找出确实无IP的域名
      - matches:
        - "rcode 0 3"
        - "!resp_ip 2000::/3"
        exec: fast_mark 20                          #做出标记
      - matches: fast_mark 20                       #上游dns未返回ip
        exec:
          - $my_nov6list                            #加入自生成无v4域名清单
          - drop_resp                               #避免cname传递
          - reject 0                                #此处仅跳出当前exec隐藏子序列并设置rcode
      - matches: fast_mark 20
        exec: exit                                  #跳出所有处理逻辑结束处理
##有ip响应的，对比直连IP与geoipcn后再处理
      - matches: "resp_ip $direct_ip"               #dns响应含有指定直连的IP
        exec: $sequence_addrealiplist_exit          #请求国内realip并加入国内域名列表后结束；定义: sub_config/forward_1.yaml:122
      - matches: "resp_ip $geoip_cn"                #标记列表外域名上游dns获取了!cn ip
        exec: $sequence_addrealiplist_exit          #请求国内realip并加入国内域名列表后结束；定义: sub_config/forward_1.yaml:122
      - exec: $sequence_fakeip_addlist_exit         #前面没有v6 ip的已被过滤并结束，此处都有非cn v6 ip；定义: sub_config/forward_1.yaml:265

#cnfake开关打开的逻辑
